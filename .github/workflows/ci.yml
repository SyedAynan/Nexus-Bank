# ============================================================
# File: ci.yml
#
# Purpose:
#     GitHub Actions CI pipeline for the NEXA platform.
#     Runs code quality checks and frontend build verification.
#
# Pipeline: quality → test → frontend
#     - quality: Ruff linting + formatting
#     - test: Pytest with SQLite (lightweight CI check)
#     - frontend: Vite production build
#
# Deployment:
#     Render auto-deploys from main branch — no CI deploy step needed.
# ============================================================

name: NEXA CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ══════════════════════════════════════════════════════════════
  # Stage 1: Code Quality (Lint + Format)
  # ══════════════════════════════════════════════════════════════
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: bank_system/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r bank_system/requirements.txt
          pip install ruff

      - name: Lint with Ruff
        run: ruff check bank_system/ --output-format=github
        continue-on-error: true

      - name: Check formatting with Ruff
        run: ruff format --check bank_system/
        continue-on-error: true

  # ══════════════════════════════════════════════════════════════
  # Stage 2: Backend Tests
  # ══════════════════════════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    needs: quality

    env:
      DATABASE_URL: sqlite:///./test.db
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENVIRONMENT: testing
      DEMO_MODE: "true"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: bank_system/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r bank_system/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests
        run: pytest tests/ -v --cov=bank_system --cov-report=term-missing
        continue-on-error: true

  # ══════════════════════════════════════════════════════════════
  # Stage 3: Frontend Build
  # ══════════════════════════════════════════════════════════════
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: /api
