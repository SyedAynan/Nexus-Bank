# ============================================================
# File: 03-backend.yaml
#
# Purpose:
#     Backend (FastAPI) Deployment with Horizontal Pod Autoscaler.
#     This is the core API service that handles all business logic,
#     authentication, and database operations.
#
# Developer Journey:
#     - v1: Single uvicorn process on a VM — no auto-scaling, no health
#       checks, manual restarts on crashes.
#     - v2: Docker container on Render.com — basic hosting but no
#       horizontal scaling or self-healing.
#     - v3: Kubernetes Deployment with HPA — auto-scales 2-10 pods based
#       on CPU/memory utilization, self-heals on crashes, and performs
#       rolling updates for zero-downtime deployments.
#
# Scaling Strategy:
#     - Minimum 2 replicas for high availability (one pod can go down)
#     - HPA scales up to 10 pods when CPU > 70% or memory > 80%
#     - Scale-up: aggressive (2 pods per minute)
#     - Scale-down: conservative (1 pod per 2 minutes, 5-min stabilization)
#       to prevent flapping during traffic spikes
#
# Deployment Strategy:
#     Rolling update with maxUnavailable=0 and maxSurge=1 means:
#     - A new pod is created BEFORE an old one is terminated
#     - At no point are there fewer pods than the desired count
#     - Result: zero downtime during deployments
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexa-backend
  namespace: nexa-prod
  labels:
    app: nexa
    component: backend
spec:
  replicas: 2   # Minimum 2 for high availability
  selector:
    matchLabels:
      app: nexa
      component: backend
  strategy:
    # Rolling update ensures zero-downtime deployments
    # New pods are started before old pods are terminated
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0   # Never go below desired replica count
      maxSurge: 1          # Create 1 extra pod during rollout
  template:
    metadata:
      labels:
        app: nexa
        component: backend
    spec:
      # Init container: waits for PostgreSQL before starting the backend
      # This prevents the backend from crashing with "connection refused"
      # during initial cluster setup when PostgreSQL isn't ready yet.
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z nexa-postgres 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
      containers:
        - name: backend
          # Image is pushed by CI/CD pipeline to GitHub Container Registry
          # The :latest tag is replaced with :$GITHUB_SHA during deployment
          image: ghcr.io/syedaynan/nexus-bank:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            # Non-sensitive config from ConfigMap
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: nexa-config
                  key: ENVIRONMENT
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: nexa-config
                  key: DEBUG
            - name: DEMO_MODE
              valueFrom:
                configMapKeyRef:
                  name: nexa-config
                  key: DEMO_MODE
            - name: WORKERS
              valueFrom:
                configMapKeyRef:
                  name: nexa-config
                  key: WORKERS
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: nexa-config
                  key: REDIS_URL
            # Sensitive config from Secret
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nexa-secrets
                  key: SECRET_KEY
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexa-secrets
                  key: POSTGRES_PASSWORD
            # DATABASE_URL uses $(POSTGRES_PASSWORD) which Kubernetes resolves
            # from the Secret at pod creation time
            - name: DATABASE_URL
              value: "postgresql+psycopg2://nexa:$(POSTGRES_PASSWORD)@nexa-postgres:5432/nexa"
            - name: ML_MODEL_DIR
              value: "bank_system/ml_models"
            - name: EVENT_BUS_MODE
              value: "in-process"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          # Readiness probe: Is the app ready to serve traffic?
          # Kubernetes removes the pod from Service endpoints until this passes.
          # This prevents sending traffic to pods that are still starting up.
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # Liveness probe: Is the app still alive?
          # If this fails, Kubernetes restarts the pod.
          # Uses a longer interval than readiness to avoid unnecessary restarts.
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          # Startup probe: Is the app finished starting up?
          # Prevents liveness probe from killing slow-starting pods.
          # Important because DB migrations and seeding can take 30+ seconds.
          startupProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30   # 30 * 5s = 150s max startup time
---
# ClusterIP Service: Internal DNS endpoint for the backend
# The Ingress controller routes external traffic to this service
apiVersion: v1
kind: Service
metadata:
  name: nexa-backend
  namespace: nexa-prod
  labels:
    app: nexa
    component: backend
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: nexa
    component: backend
---
# ── Horizontal Pod Autoscaler ──
# Automatically scales the backend deployment based on resource utilization.
#
# How HPA works:
#     1. Metrics Server collects CPU/memory usage from all pods
#     2. HPA controller checks metrics every 15 seconds (default)
#     3. If average utilization exceeds target, HPA increases replicas
#     4. If utilization drops below target, HPA decreases replicas
#     5. Stabilization windows prevent rapid scale-up/down (flapping)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexa-backend-hpa
  namespace: nexa-prod
  labels:
    app: nexa
    component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexa-backend
  minReplicas: 2    # Always run at least 2 pods for high availability
  maxReplicas: 10   # Cap at 10 pods to control costs
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70   # Scale up when CPU > 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80   # Scale up when memory > 80%
  behavior:
    # Scale-up: aggressive — respond quickly to traffic spikes
    scaleUp:
      stabilizationWindowSeconds: 60    # Wait 60s before scaling up again
      policies:
        - type: Pods
          value: 2              # Add up to 2 pods at a time
          periodSeconds: 60
    # Scale-down: conservative — avoid killing pods during brief lulls
    scaleDown:
      stabilizationWindowSeconds: 300   # Wait 5 minutes before scaling down
      policies:
        - type: Pods
          value: 1              # Remove 1 pod at a time
          periodSeconds: 120    # At most every 2 minutes
