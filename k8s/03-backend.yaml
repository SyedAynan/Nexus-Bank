# ============================================================
# NEXA — Kubernetes: Backend Deployment + HPA
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexa-backend
  namespace: nexa-prod
  labels:
    app: nexa
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexa
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: nexa
        component: backend
    spec:
      initContainers:
        # Wait for PostgreSQL before starting
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z nexa-postgres 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
      containers:
        - name: backend
          image: ghcr.io/syedaynan/nexus-bank:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: nexa-config
                  key: ENVIRONMENT
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: nexa-config
                  key: DEBUG
            - name: DEMO_MODE
              valueFrom:
                configMapKeyRef:
                  name: nexa-config
                  key: DEMO_MODE
            - name: WORKERS
              valueFrom:
                configMapKeyRef:
                  name: nexa-config
                  key: WORKERS
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: nexa-config
                  key: REDIS_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nexa-secrets
                  key: SECRET_KEY
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexa-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+psycopg2://nexa:$(POSTGRES_PASSWORD)@nexa-postgres:5432/nexa"
            - name: ML_MODEL_DIR
              value: "bank_system/ml_models"
            - name: EVENT_BUS_MODE
              value: "in-process"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: nexa-backend
  namespace: nexa-prod
  labels:
    app: nexa
    component: backend
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: nexa
    component: backend
---
# ── Horizontal Pod Autoscaler ──
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexa-backend-hpa
  namespace: nexa-prod
  labels:
    app: nexa
    component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexa-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
