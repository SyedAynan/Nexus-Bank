# ============================================================
# NEXA — Kubernetes: Frontend Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexa-frontend
  namespace: nexa-prod
  labels:
    app: nexa
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexa
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: nexa
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/syedaynan/nexus-bank-frontend:latest
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: nexa-frontend
  namespace: nexa-prod
  labels:
    app: nexa
    component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: nexa
    component: frontend
