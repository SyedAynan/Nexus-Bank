# ============================================================
# NEXA v4.0 — Beyond Fintech | Docker Compose (Development)
# Architecture: Monolith + Event Bus + ML Fraud + Redis DSA
# ============================================================

services:
  # ── Backend API ──
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexa-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://nexa:nexa@db:5432/nexa
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=nexa_graph_2026
      - EVENT_BUS_MODE=in-process
      - ML_MODEL_DIR=bank_system/ml_models
    command: >
      uvicorn bank_system.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexa-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ── PostgreSQL Database ──
  db:
    image: postgres:15-alpine
    container_name: nexa-db
    restart: always
    environment:
      POSTGRES_DB: nexa
      POSTGRES_USER: nexa
      POSTGRES_PASSWORD: nexa
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexa-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U nexa -d nexa" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis Cache + DSA Persistence ──
  redis:
    image: redis:7-alpine
    container_name: nexa-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - nexa-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Neo4j Graph Database (AML / Compliance) ──
  neo4j:
    image: neo4j:5-community
    container_name: nexa-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/nexa_graph_2026
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
    networks:
      - nexa-net
    healthcheck:
      test: [ "CMD", "neo4j", "status" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Redis Commander (Dev debugging UI) ──
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: nexa-redis-commander
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    networks:
      - nexa-net
    profiles:
      - debug   # Only starts with: docker compose --profile debug up

  # ── React Frontend (Development) ──
  frontend:
    image: node:20-alpine
    container_name: nexa-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - web
    networks:
      - nexa-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  neo4j_data:
    driver: local
  frontend_node_modules:
    driver: local

networks:
  nexa-net:
    driver: bridge

