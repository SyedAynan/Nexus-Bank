# ============================================================
# NEXA — Beyond Fintech | Docker Compose (Development)
# ============================================================

services:
  # ── Backend API ──
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexa-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: >
      uvicorn bank_system.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexa-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ── PostgreSQL Database ──
  db:
    image: postgres:15-alpine
    container_name: nexa-db
    restart: always
    environment:
      POSTGRES_DB: nexa
      POSTGRES_USER: nexa
      POSTGRES_PASSWORD: nexa
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexa-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U nexa -d nexa" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis Cache ──
  redis:
    image: redis:7-alpine
    container_name: nexa-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - nexa-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── React Frontend (Development) ──
  frontend:
    image: node:20-alpine
    container_name: nexa-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - web
    networks:
      - nexa-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  frontend_node_modules:
    driver: local

networks:
  nexa-net:
    driver: bridge
