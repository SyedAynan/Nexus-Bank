# ============================================================
# File: render.yaml
#
# Purpose:
#     Render Blueprint for automatic deployment of the NEXA backend.
#     Render reads this file to configure the web service, environment
#     variables, build commands, and health checks.
#
# Developer Journey:
#     - v1: Manual deployment — SSH into a VM, git pull, restart uvicorn.
#       Downtime on every deployment, no rollback capability.
#     - v2: Connected to Render with basic settings. Used SQLite, which
#       lost all data on every deploy (Render's filesystem is ephemeral).
#     - v3: Migrated to PostgreSQL (DATABASE_URL set manually to Render
#       PostgreSQL addon or external provider like Neon/Supabase).
#       Added REDIS_URL for OTP storage and rate limiting.
#     - v4: Removed Railway config. Render is now the sole deployment
#       platform. Added gunicorn for production stability.
#
# Issue Faced:
#     "Invalid credentials" in production was caused by:
#     1. DATABASE_URL still pointing to SQLite (ephemeral on Render)
#     2. Admin user not seeded in the fresh PostgreSQL database
#     3. SECRET_KEY changing on every deploy (JWTs became invalid)
#     Fixed by: setting DATABASE_URL to PostgreSQL, using generateValue
#     for SECRET_KEY (persists across deploys), and adding seed on startup.
#
# How to deploy:
#     Option 1 (Blueprint): Render auto-detects this file on connect.
#     Option 2 (Manual): Set build/start commands in Render dashboard.
#
# Render Deployment Settings:
#     Build Command:  pip install -r bank_system/requirements.txt
#     Start Command:  uvicorn bank_system.main:app --host 0.0.0.0 --port $PORT
#     Health Check:   /api/health
#     Root Directory: (leave empty — project root)
#     Runtime:        Python 3
#
# Docs: https://render.com/docs/blueprint-spec
# ============================================================

services:
  - type: web
    name: nexa-api
    runtime: python
    plan: free  # Use "starter" ($7/mo) for always-on production
    region: oregon  # Closest to most cloud PostgreSQL providers
    buildCommand: pip install -r bank_system/requirements.txt
    startCommand: uvicorn bank_system.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: DEMO_MODE
        value: "true"  # Seeds admin/admin123 on first startup
      # Auto-generated secret key — persists across deploys on Render
      - key: SECRET_KEY
        generateValue: true
      # Database — MUST be set manually in Render dashboard
      # Use Render PostgreSQL addon, Neon (neon.tech), or Supabase
      # Format: postgresql+psycopg2://user:pass@host:5432/dbname
      - key: DATABASE_URL
        sync: false
      # Redis — optional (FakeRedis fallback works for demos)
      # Use Render Redis addon or Upstash (upstash.com)
      - key: REDIS_URL
        sync: false
      # Frontend URL for CORS — set to your Vercel deployment URL
      - key: FRONTEND_URL
        sync: false
      # Required for Python to find the bank_system package
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRES_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRES_MINUTES
        value: "10080"
      - key: ML_MODEL_DIR
        value: bank_system/ml_models
      - key: EVENT_BUS_MODE
        value: in-process
    # Health check — Render pings this to verify the app is running
    healthCheckPath: /api/health
