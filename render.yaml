# ============================================================
# NEXA — Render Blueprint (Backend Deployment)
# ============================================================
# Deploy: Connect this repo to Render and it auto-detects this file.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: nexa-api
    runtime: python
    plan: free
    buildCommand: pip install -r bank_system/requirements.txt
    startCommand: uvicorn bank_system.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: DEMO_MODE
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false  # Must be set manually — use Render PostgreSQL addon, Neon, or Supabase
      - key: REDIS_URL
        sync: false  # Must be set manually — use Render Redis addon or Upstash
      - key: FRONTEND_URL
        value: https://your-nexus-bank.vercel.app
      - key: PYTHONPATH
        value: /opt/render/project/src
    healthCheckPath: /api/health
