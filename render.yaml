# ============================================================
# File: render.yaml
#
# Purpose:
#     Render Blueprint for automatic deployment of the NEXA backend.
#     Render reads this file to configure the web service, environment
#     variables, build commands, and health checks.
#
# Developer Journey:
#     - v1: Manual deployment — SSH into a VM, git pull, restart uvicorn.
#       Downtime on every deployment, no rollback capability.
#     - v2: Connected to Render with basic settings. Used SQLite, which
#       lost all data on every deploy (Render's filesystem is ephemeral).
#     - v3: Migrated to PostgreSQL (DATABASE_URL set manually to Render
#       PostgreSQL addon or external provider like Neon/Supabase).
#       Added REDIS_URL for OTP storage and rate limiting.
#
# Issue Faced:
#     "Invalid credentials" in production was caused by:
#     1. DATABASE_URL still pointing to SQLite (ephemeral on Render)
#     2. Admin user not seeded in the fresh PostgreSQL database
#     3. SECRET_KEY changing on every deploy (JWTs became invalid)
#     Fixed by: setting DATABASE_URL to PostgreSQL, using generateValue
#     for SECRET_KEY (persists across deploys), and adding seed on startup.
#
# Environment Variables:
#     - SECRET_KEY: Auto-generated by Render (generateValue: true)
#     - DATABASE_URL: Must be set manually — use Render PostgreSQL, Neon, or Supabase
#     - REDIS_URL: Must be set manually — use Render Redis or Upstash
#     - FRONTEND_URL: Your Vercel deployment URL (for CORS)
#
# Docs: https://render.com/docs/blueprint-spec
# ============================================================

services:
  - type: web
    name: nexa-api
    runtime: python
    plan: free  # For development — upgrade to "starter" for production
    buildCommand: pip install -r bank_system/requirements.txt
    # Uvicorn starts on the port Render assigns via $PORT
    startCommand: uvicorn bank_system.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: DEMO_MODE
        value: "true"  # Enable demo data seeding
      # Auto-generated secret key — persists across deploys on Render
      - key: SECRET_KEY
        generateValue: true
      # Database — must be configured manually
      # Use Render PostgreSQL addon, Neon (neon.tech), or Supabase
      - key: DATABASE_URL
        sync: false  # Must be set manually — use Render PostgreSQL addon, Neon, or Supabase
      # Redis — must be configured manually
      # Use Render Redis addon or Upstash (upstash.com) for free tier
      - key: REDIS_URL
        sync: false  # Must be set manually — use Render Redis addon or Upstash
      # Frontend URL for CORS whitelist
      - key: FRONTEND_URL
        value: https://your-nexus-bank.vercel.app
      # Required for Python to find the bank_system package
      - key: PYTHONPATH
        value: /opt/render/project/src
    # Health check endpoint — Render pings this to verify the app is running
    healthCheckPath: /api/health
