[tool.ruff]
target-version = "py311"
line-length = 120
src = ["bank_system"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = [
    "E501",   # line too long — handled by formatter
]
fixable = ["ALL"]

[tool.ruff.lint.isort]
known-first-party = ["bank_system"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
