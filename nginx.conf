# ============================================================
# File: nginx.conf
#
# Purpose:
#     Nginx configuration for the NEXA frontend container.
#     Serves the React SPA and reverse-proxies API requests to the backend.
#
# Developer Journey:
#     - v1: No Nginx — frontend served by Vite dev server in production.
#       This served unminified files, had no caching, and showed console warnings.
#     - v2: Frontend served by FastAPI's StaticFiles mount. This worked but
#       Python is 10-100x slower than Nginx for static file serving.
#     - v3: Dedicated Nginx container — proper static file serving with
#       gzip compression, cache headers, SPA routing, and reverse proxy.
#
# Key Features:
#     1. SPA Routing (try_files): All frontend routes (e.g., /dashboard,
#        /settings) serve index.html. React Router handles client-side routing.
#     2. API Reverse Proxy: /api/* requests are proxied to the backend service
#        at nexa-backend:8000. This avoids CORS issues because both frontend
#        and API appear to be on the same origin from the browser's perspective.
#     3. WebSocket Support: /ws/* connections use HTTP/1.1 upgrade headers
#        for real-time dashboard updates.
#     4. Static Asset Caching: JS, CSS, images cached for 1 year with
#        immutable flag (Vite generates unique filenames on each build).
#
# Issue Faced:
#     React Router routes (e.g., /dashboard) returned 404 because Nginx
#     tried to find a matching file. Fixed with try_files $uri $uri/ /index.html
#     which falls back to index.html for all unknown paths.
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──
    # These headers protect against common web attacks
    add_header X-Frame-Options "SAMEORIGIN" always;        # Prevent clickjacking
    add_header X-Content-Type-Options "nosniff" always;     # Prevent MIME-type sniffing
    add_header X-XSS-Protection "1; mode=block" always;     # Enable browser XSS filter
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip Compression ──
    # Compresses responses to reduce bandwidth usage (typically 70-80% reduction)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ── API Reverse Proxy → Backend Service ──
    # All /api/* requests are forwarded to the FastAPI backend.
    # This ensures the browser only talks to one origin (port 80),
    # eliminating CORS issues entirely.
    # The backend service name 'nexa-backend' is resolved by Docker DNS
    # (in docker-compose) or Kubernetes CoreDNS (in K8s).
    location /api/ {
        proxy_pass http://nexa-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;           # Forward real client IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;         # Forward HTTP/HTTPS

        # WebSocket support for API endpoints
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout settings
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;   # Long timeout for analytics queries
        proxy_send_timeout 30s;
    }

    # ── WebSocket Endpoint ──
    # Dedicated WebSocket location for the real-time dashboard
    location /ws/ {
        proxy_pass http://nexa-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Backend Passthrough Routes ──
    # Health check, Swagger docs, and OpenAPI schema are served by the backend
    location /health {
        proxy_pass http://nexa-backend:8000;
    }

    location /docs {
        proxy_pass http://nexa-backend:8000;
    }

    location /redoc {
        proxy_pass http://nexa-backend:8000;
    }

    location /openapi.json {
        proxy_pass http://nexa-backend:8000;
    }

    # ── SPA Fallback ──
    # For all other paths, try to serve a matching file.
    # If no file matches, serve index.html — React Router handles the routing.
    # Without this, paths like /dashboard would return 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static Asset Caching ──
    # Vite generates unique filenames (hash-based) for each build, so we can
    # cache aggressively (1 year). The 'immutable' flag tells browsers and CDNs
    # that this file will NEVER change at this URL — no revalidation needed.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;   # Don't log static asset requests (reduces log noise)
    }
}
