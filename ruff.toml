# Ruff configuration — Python linter/formatter
# Moved from pyproject.toml to avoid Render detecting Poetry
target-version = "py311"
line-length = 120
src = ["bank_system"]

[lint]
select = ["E", "F", "W", "I", "UP"]
ignore = ["E501"]
fixable = ["ALL"]

[lint.isort]
known-first-party = ["bank_system"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
